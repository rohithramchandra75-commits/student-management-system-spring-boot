<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">

                    <h3>Edit Student</h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/update}" th:object="${user}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   required>

                        </div>

                        <button class="btn btn-success">

                            Update Student

                        </button>

                        <a href="/dashboard"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
