<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:12px;
        }

        table{
            background:white;
        }

        h2,h3,h4{
            font-weight:bold;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand">
            Student Management System
        </a>

        <a th:href="@{/logout}" class="btn btn-light">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow bg-primary text-white">

                <div class="card-body">

                    <h5>Total Students</h5>

                    <h2 th:text="${count}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow bg-success text-white">

                <div class="card-body">

                    <h5>Logged In User</h5>

                    <h4 th:text="${user.name}"></h4>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow bg-warning">

                <div class="card-body">

                    <h5>Email</h5>

                    <h6 th:text="${user.email}"></h6>

                </div>

            </div>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-3">
                Search Student
            </h3>

            <form th:action="@{/search}" method="get">

                <div class="row">

                    <div class="col-md-10">

                        <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter student name">

                    </div>

                    <div class="col-md-2">

                        <button
                                class="btn btn-primary w-100">

                            Search

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-3">

                Registered Students

            </h3>

            <table class="table table-bordered table-hover table-striped">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Password</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="u : ${users}">

                    <td th:text="${u.id}"></td>

                    <td th:text="${u.name}"></td>

                    <td th:text="${u.email}"></td>

                    <td th:text="${u.password}"></td>

                    <td>

                        <a
                                th:href="@{/edit/{id}(id=${u.id})}"
                                class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <a
                                th:href="@{/delete/{id}(id=${u.id})}"
                                class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
