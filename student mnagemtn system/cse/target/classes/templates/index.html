<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="#">Student Management System</a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row align-items-center">

        <div class="col-md-6">

            <h1 class="display-4 fw-bold">
                Welcome to Student Management System
            </h1>

            <p class="lead">
                Manage student registrations, login, and records using Spring Boot, MySQL, Thymeleaf, and Bootstrap.
            </p>

            <a th:href="@{/login}" class="btn btn-primary btn-lg me-3">
                Login
            </a>

            <a th:href="@{/register}" class="btn btn-success btn-lg">
                Register
            </a>

        </div>

        <div class="col-md-6 text-center">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
                 class="img-fluid"
                 width="350"
                 alt="Student">

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

    <p class="mb-0">
        © 2026 Student Management System | Developed using Spring Boot & MySQL
    </p>

</footer>

</body>

</html>
